<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List Product</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-qNfsTykzJPEj1Sv5WaRU9OFeRpok6YctnYm0r5pn1Yt2bRjXh03JH9y6NwHALEwN"
          crossorigin="anonymous"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-app border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid d-flex" style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/add}">Products</a>
        <a class="navbar-brand" th:href="@{/order}" th:if="${isLoggedIn}">Order</a>
        <div class="ms-auto d-flex align-items-center gap-3" th:if="${isLoggedIn}">
            <a class="text-light text-decoration-none" th:href="@{/home}"><span th:text="${username}">User</span></a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container body-content flex-grow-1">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <h1 class="page-title mb-0">Danh sách sản phẩm</h1>
        <a th:href="@{/products/add}" class="btn btn-create">➕ Create New Product</a>
    </div>
    <div class="card-wrap">
        <table class="table table-app">
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Image</th>
                <th>Price</th>
                <th>Category Name</th>
                <th style="width: 180px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="6" class="text-center py-4 text-muted">Chưa có sản phẩm nào. <a th:href="@{/products/add}">Thêm sản phẩm</a></td>
            </tr>
            <tr th:each="product : ${products}">
                <th th:text="${product.id}"></th>
                <td><strong th:text="${product.name}"></strong></td>
                <td><img th:if="${product.image}" height="120" width="150" th:src="${product.image}" alt="Product Image" class="img-thumbnail"><span th:unless="${product.image}" class="text-muted">—</span></td>
                <td><span class="price-badge" th:text="|${product.price} ₫|"></span></td>
                <td th:text="${product.category != null ? product.category.name : ''}"></td>
                <td>
                    <div class="table-actions">
                        <form th:action="@{/products/edit/{id}(id=${product.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-edit-app">Edit</button>
                        </form>
                        <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-delete-app">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="footer-app">
    <p>&copy; 2025 Phát triển ứng dụng với J2EE</p>
</footer>
</body>
</html>
