<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-qNfsTykzJPEj1Sv5WaRU9OFeRpok6YctnYm0r5pn1Yt2bRjXh03JH9y6NwHALEwN"
          crossorigin="anonymous"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-app border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid d-flex" style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/add}">Products</a>
        <a class="navbar-brand" th:href="@{/order}" th:if="${isLoggedIn}">Order</a>
        <div class="ms-auto d-flex align-items-center gap-3" th:if="${isLoggedIn}">
            <a class="text-light text-decoration-none" th:href="@{/home}"><span th:text="${username}">User</span></a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container body-content">
    <h1 class="page-title mb-4">Thêm sản phẩm</h1>
    <div class="form-card">
        <form th:action="@{/products/save}" th:object="${product}" method="post" class="form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name" class="form-label">Name:</label>
                <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
            </div>
            <div class="form-group">
                <label for="imageFile" class="form-label">Chọn ảnh:</label>
                <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*">
            </div>
            <div class="form-group">
                <label for="price" class="form-label">Price:</label>
                <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
            </div>
            <div class="form-group">
                <label for="categoryId" class="form-label">Category:</label>
                <select name="categoryId" id="categoryId" class="form-control form-select" required>
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"></option>
                </select>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-submit">✓ Add Product</button>
                <a th:href="@{/products}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer-app">
    <p>&copy; 2025 Phát triển ứng dụng với J2EE</p>
</footer>
</body>
</html>
