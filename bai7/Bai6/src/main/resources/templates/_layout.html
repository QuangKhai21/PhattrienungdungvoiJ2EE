<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Bài 5_QLSP JPA</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-qNfsTykzJPEj1Sv5WaRU9OFeRpok6YctnYm0r5pn1Yt2bRjXh03JH9y6NwHALEwN"
          crossorigin="anonymous"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-app border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid d-flex" style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/add}">Products</a>
        <a class="navbar-brand" th:href="@{/order}" th:if="${isLoggedIn}">Order</a>
        <div class="ms-auto d-flex align-items-center gap-3" th:if="${isLoggedIn}">
            <a class="text-light text-decoration-none" th:href="@{/home}">
                <span th:text="${username}">User</span>
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div layout:fragment="content" class="container body-content flex-grow-1">
</div>

<footer class="footer-app">
    <p>&copy; 2025 Phát triển ứng dụng với J2EE</p>
</footer>
</body>
</html>
