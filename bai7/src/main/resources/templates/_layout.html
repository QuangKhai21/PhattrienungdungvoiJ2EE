<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-shadow: 0 10px 35px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
            --nav-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        body {
            background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Enhanced Navbar */
        .navbar {
            background: var(--nav-bg) !important;
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
            -webkit-text-fill-color: #fff;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link.active {
            color: #667eea !important;
            background: rgba(255, 255, 255, 0.15);
        }

        .nav-link i {
            margin-right: 6px;
        }

        /* Badge Styling */
        .badge {
            font-weight: 500;
            padding: 0.5em 0.8em;
            border-radius: 20px;
        }

        .bg-info {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
        }

        /* Button Enhancements */
        .btn-outline-danger {
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-danger:hover {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        /* Footer */
        .card-footer {
            background: var(--nav-bg);
            color: rgba(255, 255, 255, 0.7);
            padding: 1.5rem;
            margin-top: auto;
        }

        .card-footer hr {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-footer p {
            margin: 0;
            font-size: 0.95rem;
        }

        /* Content Container */
        .container.body-content {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            min-height: calc(100vh - 200px);
        }

        /* Smooth Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container.body-content {
            animation: fadeInUp 0.5s ease-out;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 5px;
        }

        /* Tránh lớp .modal-backdrop kẹt lại chặn toàn bộ click */
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.modal-backdrop').forEach(function (el) { el.remove(); });
            document.body.classList.remove('modal-open');
            document.body.style.removeProperty('overflow');
            document.body.style.removeProperty('padding-right');
        });
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-light border-opacity-10">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/products}">
            <i class="bi bi-shop"></i> QL Sản Phẩm
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="bi bi-grid-3x3-gap"></i> Sản phẩm
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/cart}">
                        <i class="bi bi-cart3"></i> Gio hang
                        <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none;">
                            <span id="cartCount">0</span>
                            <span class="visually-hidden">san pham trong gio hang</span>
                        </span>
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <div class="text-white d-flex align-items-center gap-2">
                    <span class="badge bg-info">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">User</span>
                    </span>
                    <span sec:authorize="hasRole('ADMIN')" class="badge bg-danger">
                        <i class="bi bi-shield-check"></i> Quản trị viên
                    </span>
                    <span sec:authorize="hasRole('USER') and !hasRole('ADMIN')" class="badge bg-success">
                        <i class="bi bi-person-check"></i> Người dùng
                    </span>
                </div>
                
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-box-arrow-right"></i> Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container body-content mt-4 mb-5">
    <div layout:fragment="content"></div>
</main>

<footer class="card-footer text-center">
    <hr>
    <p><i class="bi bi-heart-fill text-danger"></i> 2025 - Phát triển ứng dụng với J2EE</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    // Clean up modal backdrop
    document.querySelectorAll('.modal-backdrop').forEach(function (el) { el.remove(); });
    document.body.classList.remove('modal-open');
    document.body.style.removeProperty('overflow');
    document.body.style.removeProperty('padding-right');
    
    // Auto-hide success/error alerts after 3 seconds
    var alerts = document.querySelectorAll('.alert:not(.alert-permanent)');
    alerts.forEach(function(alert) {
        setTimeout(function() {
            var bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        }, 3000);
    });
});
</script>
</body>
</html>
