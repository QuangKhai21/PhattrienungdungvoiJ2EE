<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công</title>
    <style>
        /* Success Page Specific Styles */
        .success-container {
            text-align: center;
            padding: 2rem;
        }

        /* Success Icon Animation */
        .success-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out;
            box-shadow: 0 15px 40px rgba(17, 153, 142, 0.4);
        }

        .success-icon i {
            font-size: 4rem;
            color: white;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Title */
        .success-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #11998e;
            margin-bottom: 1rem;
        }

        .success-message {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 0.5rem;
        }

        /* Order ID */
        .order-id {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 1rem 0 2rem;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* Order Details Card */
        .order-details-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
            text-align: left;
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-details-card .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .order-details-card .card-body {
            padding: 2rem;
        }

        /* Customer Info Grid */
        .customer-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-item {
            padding: 1rem;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
        }

        .info-item label {
            display: block;
            font-weight: 600;
            color: #667eea;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .info-item span {
            font-size: 1.05rem;
            color: #2c3e50;
            font-weight: 500;
        }

        /* Products Table */
        .products-table {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .products-table thead {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
        }

        .products-table thead th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 1rem;
            border: none;
        }

        .products-table tbody td {
            padding: 1rem;
            border-color: #f0f0f0;
            vertical-align: middle;
        }

        .products-table tbody tr:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
        }

        /* Price Styling */
        .price {
            font-weight: 600;
            color: #2c3e50;
        }

        .quantity-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .subtotal {
            font-weight: 700;
            color: #27ae60;
        }

        /* Total Row */
        .products-table tfoot {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .products-table tfoot td {
            padding: 1.2rem;
            font-size: 1.1rem;
        }

        .total-label {
            font-weight: 700;
            color: #2c3e50;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .total-amount {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Action Buttons */
        .btn-continue {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            padding: 1rem 2.5rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }

        .btn-continue:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
            color: white;
        }

        /* Confetti Animation */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2, #11998e, #38ef7d, #ff6b6b, #ee0979);
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .customer-info {
                grid-template-columns: 1fr;
            }

            .success-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="success-container">
        <!-- Success Icon -->
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>

        <!-- Success Title -->
        <h1 class="success-title">Đặt hàng thành công!</h1>
        <p class="success-message">Cảm ơn bạn đã mua sắm. Đơn hàng của bạn đã được tiếp nhận.</p>
        
        <!-- Order ID -->
        <div class="order-id">
            <i class="bi bi-receipt"></i> Mã đơn hàng: <strong th:text="${order.id}"></strong>
        </div>

        <!-- Order Details -->
        <div class="order-details-card">
            <div class="card-header">
                <i class="bi bi-clipboard-data"></i> Chi tiết đơn hàng
            </div>
            <div class="card-body">
                <!-- Customer Info -->
                <div class="customer-info">
                    <div class="info-item">
                        <label><i class="bi bi-person"></i> Họ và tên</label>
                        <span th:text="${order.customerName}"></span>
                    </div>
                    <div class="info-item">
                        <label><i class="bi bi-envelope"></i> Email</label>
                        <span th:text="${order.customerEmail}"></span>
                    </div>
                    <div class="info-item">
                        <label><i class="bi bi-phone"></i> Số điện thoại</label>
                        <span th:text="${order.customerPhone}"></span>
                    </div>
                    <div class="info-item">
                        <label><i class="bi bi-calendar-event"></i> Ngày đặt</label>
                        <span th:text="${#dates.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>

                <div class="info-item mb-4">
                    <label><i class="bi bi-geo-alt"></i> Địa chỉ giao hàng</label>
                    <span th:text="${order.shippingAddress}"></span>
                </div>

                <!-- Products Table -->
                <h5 class="mb-3"><i class="bi bi-box-seam"></i> Danh sách sản phẩm:</h5>
                <div class="table-responsive">
                    <table class="table products-table">
                        <thead>
                            <tr>
                                <th><i class="bi bi-box"></i> Tên sản phẩm</th>
                                <th class="text-end"><i class="bi bi-currency-dollar"></i> Đơn giá</th>
                                <th class="text-center"><i class="bi bi-list-ol"></i> Số lượng</th>
                                <th class="text-end"><i class="bi bi-calculator"></i> Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail : ${order.orderDetails}">
                                <td class="fw-medium" th:text="${detail.productName}"></td>
                                <td class="text-end price" th:text="${#numbers.formatDecimal(detail.price, 0, 'POINT', 0, 'POINT')} + ' ₫'"></td>
                                <td class="text-center">
                                    <span class="quantity-badge" th:text="${detail.quantity}"></span>
                                </td>
                                <td class="text-end subtotal" th:text="${#numbers.formatDecimal(detail.totalPrice, 0, 'POINT', 0, 'POINT')} + ' ₫'"></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3" class="text-end total-label">
                                    <i class="bi bi-receipt"></i> Tổng cộng:
                                </td>
                                <td class="text-end total-amount" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'POINT', 0, 'POINT')} + ' ₫'"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- Continue Button -->
        <a th:href="@{/products}" class="btn btn-continue">
            <i class="bi bi-bag-plus"></i> Tiếp tục mua sắm
        </a>
    </div>

    <!-- Confetti Animation -->
    <div class="confetti" id="confetti"></div>
</div>

<script th:inline="javascript">
// Create confetti animation
document.addEventListener('DOMContentLoaded', function() {
    const confettiContainer = document.getElementById('confetti');
    const colors = ['#667eea', '#764ba2', '#11998e', '#38ef7d', '#ff6b6b', '#ee0979'];
    
    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 2 + 's';
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confettiContainer.appendChild(confetti);
    }
    
    // Remove confetti after animation
    setTimeout(() => {
        confettiContainer.innerHTML = '';
    }, 5000);
});
</script>
</body>
</html>
