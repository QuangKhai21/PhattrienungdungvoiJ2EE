<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm mới</title>
    <style>
        /* Form Page Styles */
        .page-header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.3);
        }

        .page-header h2 {
            margin: 0;
            font-weight: 700;
        }

        /* Form Card */
        .form-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            color: #667eea;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.3rem rgba(102, 126, 234, 0.15);
        }

        /* Image Upload */
        .image-upload-wrapper {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            transition: all 0.3s ease;
        }

        .image-upload-wrapper:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }

        .image-upload-wrapper i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 25px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #0d8377 0%, #2dd468 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            border: none;
            border-radius: 25px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #7f8c8d, #6c7a7d);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(149, 165, 166, 0.4);
            color: white;
        }

        /* Validation Messages */
        .alert-warning {
            background: linear-gradient(135deg, #fff3cd, #ffeeba);
            border: none;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* Button Group */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid #f0f0f0;
        }

        /* File Input */
        input[type="file"] {
            border-radius: 10px;
        }

        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, #5568d3, #6a3f91);
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <!-- Header -->
    <div class="page-header">
        <h2><i class="bi bi-plus-circle"></i> Thêm sản phẩm mới</h2>
    </div>
    
    <div class="form-card">
        <form th:action="@{/products/create}" th:object="${product}" method="post" class="form" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="name" class="form-label">
                    <i class="bi bi-box-seam"></i> Tên sản phẩm
                </label>
                <input class="form-control" type="text" th:field="*{name}" id="name" 
                       placeholder="Nhập tên sản phẩm">
                <div class="alert alert-warning" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label for="price" class="form-label">
                    <i class="bi bi-currency-dollar"></i> Giá
                </label>
                <input class="form-control" type="number" th:field="*{price}" id="price" 
                       placeholder="Nhập giá sản phẩm" min="0" step="1000">
                <div class="alert alert-warning" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="form-group">
                <label for="image" class="form-label">
                    <i class="bi bi-image"></i> Hình ảnh
                </label>
                <div class="image-upload-wrapper">
                    <i class="bi bi-cloud-arrow-up"></i>
                    <p class="text-muted mb-2">Kéo thả hoặc nhấn để chọn hình ảnh</p>
                    <input class="form-control" type="file" id="image" name="imageProduct" 
                           accept="image/png, image/jpeg, image/jpg">
                </div>
                <div class="alert alert-warning" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
            </div>

            <div class="form-group">
                <label for="category" class="form-label">
                    <i class="bi bi-folder"></i> Danh mục
                </label>
                <select th:field="*{category.id}" class="form-select" id="category">
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"></option>
                </select>
                <div class="alert alert-warning" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle"></i> Thêm sản phẩm
                </button>
                <a th:href="@{/products}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Hủy
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
